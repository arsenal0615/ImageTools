<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IMAGES - Gemini API</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #ef4444;
            --border: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧设置面板 */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-secondary);
            padding: 20px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h1 {
            font-size: 1.5rem;
            color: var(--accent);
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .panel {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 15px;
        }

        .panel-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        input[type="text"],
        input[type="number"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            line-height: 1.5;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .size-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .size-inputs input {
            width: 80px;
        }

        .size-inputs span {
            color: var(--text-secondary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-success {
            background: var(--success);
            color: #1a1a2e;
        }

        .btn-warning {
            background: var(--warning);
            color: #1a1a2e;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-group .btn {
            flex: 1;
            min-width: 100px;
        }

        /* 右侧工作区 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 拖拽上传区 */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: var(--bg-secondary);
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }

        .upload-zone.drag-over {
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .upload-zone h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .upload-zone p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 进度条 */
        .progress-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-bar-container {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            border-radius: 4px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 图片网格 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .image-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .image-card .thumb-container {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-card .info {
            padding: 10px;
            font-size: 0.8rem;
        }

        .image-card .filename {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .image-card .dimensions {
            color: var(--text-secondary);
        }

        .image-card .status {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-pending {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .status-processing {
            background: var(--warning);
            color: #1a1a2e;
            animation: pulse 1s infinite;
        }

        .status-success {
            background: var(--success);
            color: #1a1a2e;
        }

        .status-error {
            background: var(--error);
            color: white;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .image-card .actions {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .image-card:hover .actions {
            opacity: 1;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        /* 标签页 */
        .tabs {
            display: flex;
            gap: 5px;
            background: var(--bg-secondary);
            padding: 5px;
            border-radius: 10px;
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 预览模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* 对比视图 */
        .compare-view {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .compare-item {
            text-align: center;
        }

        .compare-item img {
            max-width: 400px;
            max-height: 400px;
            border-radius: 8px;
            background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
        }

        .compare-item p {
            margin-top: 10px;
            color: var(--text-secondary);
        }

        /* 序列帧播放器 */
        .sequence-player {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .sequence-display {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            margin: 0 auto 15px;
            background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .sequence-display img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .sequence-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .sequence-slider {
            flex: 1;
            max-width: 300px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-primary);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Toast 通知 */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
            max-width: 350px;
            word-wrap: break-word;
        }

        .toast-error {
            background: var(--error);
        }

        .toast-success {
            background: var(--success);
            color: #1a1a2e;
        }

        .toast-warning {
            background: var(--warning);
            color: #1a1a2e;
        }

        .toast-info {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        /* 加载动画 */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .processing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 下载区域 */
        .download-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 {
            font-size: 1.2rem;
        }

        .image-count {
            background: var(--bg-tertiary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧设置面板 -->
        <aside class="sidebar">
            <h1>🎨 AI IMAGES</h1>

            <!-- API 配置 -->
            <div class="panel">
                <div class="panel-title">API 配置</div>
                <div class="form-group">
                    <label>Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的 API Key">
                </div>
                <div class="form-group">
                    <label>模型选择</label>
                    <select id="modelSelect">
                        <optgroup label="── 图像生成专用 ──">
                            <option value="gemini-2.0-flash-exp-image-generation">gemini-2.0-flash-exp-image-generation (推荐)</option>
                            <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
                            <option value="gemini-3-pro-image-preview">gemini-3-pro-image-preview</option>
                            <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
                        </optgroup>
                        <optgroup label="── Gemini 3.x 系列 ──">
                            <option value="gemini-3-pro-preview">gemini-3-pro-preview</option>
                            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
                            <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                            <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
                        </optgroup>
                        <optgroup label="── Gemini 2.5 系列 ──">
                            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
                        </optgroup>
                        <optgroup label="── Gemini 2.0 系列 ──">
                            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                            <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- 提示词设置 -->
            <div class="panel">
                <div class="panel-title">提示词设置</div>
                <div class="form-group">
                    <label>抠图提示词 <span style="font-size:0.75rem;color:var(--text-secondary);">(可自行修改)</span></label>
                    <textarea id="promptText" rows="14">Remove the background from this image.

CRITICAL - READ CAREFULLY:

1. Output a PNG image with REAL ALPHA TRANSPARENCY (not a checkerboard pattern!)
2. Do NOT draw a checkerboard/checkered pattern as background
3. Do NOT draw gray and white squares as background  
4. The background must be ACTUAL TRANSPARENT PIXELS (alpha = 0), not a visual pattern
5. Keep the subject EXACTLY as it is - do not modify, redraw, or enhance anything
6. Output dimensions must match input dimensions exactly
7. Preserve every single pixel of the subject without any changes

WRONG: Drawing a checkerboard pattern behind the subject
CORRECT: Setting background pixels to transparent (alpha channel = 0)

This is for sprite animation - any modification will break the animation.
Just cut out the subject with pixel-perfect accuracy and set background to true transparency.</textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btnResetPrompt" style="flex:1;">↻ 恢复默认</button>
                    <button class="btn btn-secondary" id="btnSavePrompt" style="flex:1;">💾 保存</button>
                </div>
            </div>

            <!-- 批量处理设置 -->
            <div class="panel">
                <div class="panel-title">批量处理</div>
                <div class="form-group">
                    <label>并发数量 (1-5)</label>
                    <input type="number" id="concurrency" value="1" min="1" max="5">
                </div>
            </div>

            <!-- 输出设置 -->
            <div class="panel">
                <div class="panel-title">输出设置</div>
                <div class="form-group">
                    <label>输出格式</label>
                    <select id="outputFormat">
                        <option value="png">PNG (透明背景)</option>
                        <option value="webp">WebP</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>尺寸调整</label>
                    <select id="sizeMode">
                        <option value="original">保持原尺寸</option>
                        <option value="custom">自定义宽高</option>
                        <option value="scale">按比例缩放</option>
                    </select>
                </div>
                <div class="form-group size-custom" style="display: none;">
                    <div class="size-inputs">
                        <input type="number" id="customWidth" placeholder="宽度">
                        <span>×</span>
                        <input type="number" id="customHeight" placeholder="高度">
                    </div>
                    <div class="checkbox-group" style="margin-top: 8px;">
                        <input type="checkbox" id="lockRatio" checked>
                        <label for="lockRatio">锁定比例</label>
                    </div>
                </div>
                <div class="form-group size-scale" style="display: none;">
                    <label>缩放比例 (%)</label>
                    <input type="number" id="scalePercent" value="100" min="1" max="500">
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="panel">
                <div class="panel-title">操作控制</div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="btnStart">▶ 开始处理</button>
                    <button class="btn btn-warning" id="btnPause" disabled>⏸ 暂停</button>
                </div>
                <div class="btn-group" style="margin-top: 10px;">
                    <button class="btn btn-danger" id="btnCancel" disabled>✕ 取消</button>
                    <button class="btn btn-secondary" id="btnClear">🗑 清空全部</button>
                </div>
            </div>

            <!-- 下载 -->
            <div class="panel">
                <div class="panel-title">下载</div>
                <div class="btn-group">
                    <button class="btn btn-success" id="btnDownloadAll" disabled>📦 打包下载</button>
                </div>
            </div>
        </aside>

        <!-- 右侧工作区 -->
        <main class="main-content">
            <!-- 上传区域 -->
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📁</div>
                <h3>拖拽图片到这里，或点击选择</h3>
                <p>支持 JPG、PNG、WebP、GIF 等常见格式，可多选</p>
                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
            </div>

            <!-- 进度条 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-header">
                    <span>处理进度</span>
                    <span id="progressText">0 / 0</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
            </div>

            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" data-tab="source">原始图片</button>
                <button class="tab" data-tab="result">处理结果</button>
                <button class="tab" data-tab="sequence">序列帧预览</button>
            </div>

            <!-- 原始图片 -->
            <div class="tab-content active" id="tab-source">
                <div class="section-header">
                    <h2>原始图片</h2>
                    <span class="image-count" id="sourceCount">0 张图片</span>
                </div>
                <div class="image-grid" id="sourceGrid"></div>
                <div class="empty-state" id="sourceEmpty">
                    <div class="icon">🖼️</div>
                    <p>还没有上传图片</p>
                </div>
            </div>

            <!-- 处理结果 -->
            <div class="tab-content" id="tab-result">
                <div class="section-header">
                    <h2>处理结果</h2>
                    <span class="image-count" id="resultCount">0 张完成</span>
                </div>
                <div class="image-grid" id="resultGrid"></div>
                <div class="empty-state" id="resultEmpty">
                    <div class="icon">✨</div>
                    <p>处理完成的图片将显示在这里</p>
                </div>
            </div>

            <!-- 序列帧预览 -->
            <div class="tab-content" id="tab-sequence">
                <div class="sequence-player">
                    <div class="sequence-display" id="sequenceDisplay">
                        <p style="color: var(--text-secondary);">完成处理后可预览序列帧</p>
                    </div>
                    <div class="sequence-controls">
                        <button class="btn btn-secondary" id="btnSeqPrev">◀</button>
                        <button class="btn btn-primary" id="btnSeqPlay">▶ 播放</button>
                        <button class="btn btn-secondary" id="btnSeqNext">▶</button>
                    </div>
                    <div class="form-group" style="max-width: 300px; margin: 0 auto;">
                        <label>播放速度 (帧/秒): <span id="fpsValue">5</span></label>
                        <input type="range" id="fpsSlider" min="1" max="30" value="5">
                    </div>
                    <div class="form-group" style="max-width: 300px; margin: 15px auto 0;">
                        <label>当前帧: <span id="frameValue">0</span> / <span id="totalFrames">0</span></label>
                        <input type="range" id="frameSlider" min="0" max="0" value="0">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 预览模态框 -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="compare-view" id="compareView">
                <div class="compare-item">
                    <img id="compareOriginal" src="">
                    <p>原图</p>
                </div>
                <div class="compare-item">
                    <img id="compareResult" src="">
                    <p>抠图结果</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const DEFAULT_PROMPT = `Remove the background from this image.

CRITICAL - READ CAREFULLY:

1. Output a PNG image with REAL ALPHA TRANSPARENCY (not a checkerboard pattern!)
2. Do NOT draw a checkerboard/checkered pattern as background
3. Do NOT draw gray and white squares as background  
4. The background must be ACTUAL TRANSPARENT PIXELS (alpha = 0), not a visual pattern
5. Keep the subject EXACTLY as it is - do not modify, redraw, or enhance anything
6. Output dimensions must match input dimensions exactly
7. Preserve every single pixel of the subject without any changes

WRONG: Drawing a checkerboard pattern behind the subject
CORRECT: Setting background pixels to transparent (alpha channel = 0)

This is for sprite animation - any modification will break the animation.
Just cut out the subject with pixel-perfect accuracy and set background to true transparency.`;

        // 状态管理
        const state = {
            images: [],
            results: new Map(),
            processing: false,
            paused: false,
            cancelled: false,
            completed: 0,
            failed: 0,
            currentTasks: new Set(),
            sequencePlaying: false,
            sequenceInterval: null,
            currentFrame: 0
        };

        // DOM 元素
        const elements = {
            apiKey: document.getElementById('apiKey'),
            modelSelect: document.getElementById('modelSelect'),
            concurrency: document.getElementById('concurrency'),
            outputFormat: document.getElementById('outputFormat'),
            sizeMode: document.getElementById('sizeMode'),
            customWidth: document.getElementById('customWidth'),
            customHeight: document.getElementById('customHeight'),
            lockRatio: document.getElementById('lockRatio'),
            scalePercent: document.getElementById('scalePercent'),
            uploadZone: document.getElementById('uploadZone'),
            fileInput: document.getElementById('fileInput'),
            progressSection: document.getElementById('progressSection'),
            progressBar: document.getElementById('progressBar'),
            progressText: document.getElementById('progressText'),
            sourceGrid: document.getElementById('sourceGrid'),
            resultGrid: document.getElementById('resultGrid'),
            sourceCount: document.getElementById('sourceCount'),
            resultCount: document.getElementById('resultCount'),
            sourceEmpty: document.getElementById('sourceEmpty'),
            resultEmpty: document.getElementById('resultEmpty'),
            btnStart: document.getElementById('btnStart'),
            btnPause: document.getElementById('btnPause'),
            btnCancel: document.getElementById('btnCancel'),
            btnClear: document.getElementById('btnClear'),
            btnDownloadAll: document.getElementById('btnDownloadAll'),
            previewModal: document.getElementById('previewModal'),
            compareOriginal: document.getElementById('compareOriginal'),
            compareResult: document.getElementById('compareResult'),
            toastContainer: document.getElementById('toastContainer'),
            sequenceDisplay: document.getElementById('sequenceDisplay'),
            fpsSlider: document.getElementById('fpsSlider'),
            fpsValue: document.getElementById('fpsValue'),
            frameSlider: document.getElementById('frameSlider'),
            frameValue: document.getElementById('frameValue'),
            totalFrames: document.getElementById('totalFrames'),
            btnSeqPlay: document.getElementById('btnSeqPlay'),
            btnSeqPrev: document.getElementById('btnSeqPrev'),
            btnSeqNext: document.getElementById('btnSeqNext'),
            promptText: document.getElementById('promptText'),
            btnResetPrompt: document.getElementById('btnResetPrompt'),
            btnSavePrompt: document.getElementById('btnSavePrompt')
        };

        // 初始化
        function init() {
            loadSettings();
            setupEventListeners();
        }

        // 加载保存的设置
        function loadSettings() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) elements.apiKey.value = savedKey;

            const savedModel = localStorage.getItem('gemini_model');
            if (savedModel) elements.modelSelect.value = savedModel;

            const savedPrompt = localStorage.getItem('gemini_prompt');
            if (savedPrompt) elements.promptText.value = savedPrompt;
        }

        // 保存 API Key
        function saveApiKey() {
            localStorage.setItem('gemini_api_key', elements.apiKey.value);
        }

        // 设置事件监听
        function setupEventListeners() {
            // API Key & 模型保存
            elements.apiKey.addEventListener('change', saveApiKey);
            elements.modelSelect.addEventListener('change', () => {
                localStorage.setItem('gemini_model', elements.modelSelect.value);
            });

            // 提示词控制
            elements.btnSavePrompt.addEventListener('click', () => {
                localStorage.setItem('gemini_prompt', elements.promptText.value);
                showToast('提示词已保存', 'success');
            });
            elements.btnResetPrompt.addEventListener('click', () => {
                elements.promptText.value = DEFAULT_PROMPT;
                localStorage.removeItem('gemini_prompt');
                showToast('提示词已恢复默认', 'info');
            });

            // 文件上传
            elements.uploadZone.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', handleFileSelect);
            
            // 拖拽上传
            elements.uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                elements.uploadZone.classList.add('drag-over');
            });
            elements.uploadZone.addEventListener('dragleave', () => {
                elements.uploadZone.classList.remove('drag-over');
            });
            elements.uploadZone.addEventListener('drop', handleDrop);

            // 尺寸模式切换
            elements.sizeMode.addEventListener('change', () => {
                document.querySelectorAll('.size-custom').forEach(el => {
                    el.style.display = elements.sizeMode.value === 'custom' ? 'block' : 'none';
                });
                document.querySelectorAll('.size-scale').forEach(el => {
                    el.style.display = elements.sizeMode.value === 'scale' ? 'block' : 'none';
                });
            });

            // 控制按钮
            elements.btnStart.addEventListener('click', startProcessing);
            elements.btnPause.addEventListener('click', togglePause);
            elements.btnCancel.addEventListener('click', cancelProcessing);
            elements.btnClear.addEventListener('click', clearAll);
            elements.btnDownloadAll.addEventListener('click', downloadAll);

            // 标签页切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
                });
            });

            // 模态框关闭
            document.getElementById('modalClose').addEventListener('click', () => {
                elements.previewModal.classList.remove('active');
            });
            elements.previewModal.addEventListener('click', (e) => {
                if (e.target === elements.previewModal) {
                    elements.previewModal.classList.remove('active');
                }
            });

            // 序列帧控制
            elements.fpsSlider.addEventListener('input', () => {
                elements.fpsValue.textContent = elements.fpsSlider.value;
                if (state.sequencePlaying) {
                    stopSequence();
                    playSequence();
                }
            });
            elements.frameSlider.addEventListener('input', () => {
                state.currentFrame = parseInt(elements.frameSlider.value);
                updateSequenceDisplay();
            });
            elements.btnSeqPlay.addEventListener('click', toggleSequencePlay);
            elements.btnSeqPrev.addEventListener('click', () => navigateFrame(-1));
            elements.btnSeqNext.addEventListener('click', () => navigateFrame(1));
        }

        // 处理文件选择
        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            addFiles(files);
            e.target.value = '';
        }

        // 处理拖拽
        function handleDrop(e) {
            e.preventDefault();
            elements.uploadZone.classList.remove('drag-over');
            
            const items = Array.from(e.dataTransfer.items);
            const files = [];
            
            items.forEach(item => {
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    if (file && file.type.startsWith('image/')) {
                        files.push(file);
                    }
                }
            });
            
            addFiles(files);
        }

        // 添加文件
        async function addFiles(files) {
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                
                const id = Date.now() + Math.random().toString(36).substr(2, 9);
                const imageData = await readFileAsDataURL(file);
                const dimensions = await getImageDimensions(imageData);
                
                state.images.push({
                    id,
                    file,
                    name: file.name,
                    data: imageData,
                    width: dimensions.width,
                    height: dimensions.height,
                    status: 'pending'
                });
            }
            
            renderSourceGrid();
            updateCounts();
        }

        // 读取文件为 DataURL
        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 获取图片尺寸
        function getImageDimensions(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve({ width: img.width, height: img.height });
                img.src = dataUrl;
            });
        }

        // 渲染原始图片网格
        function renderSourceGrid() {
            elements.sourceGrid.innerHTML = '';
            elements.sourceEmpty.style.display = state.images.length ? 'none' : 'block';
            
            state.images.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <div class="thumb-container">
                        <img src="${img.data}" alt="${img.name}">
                        ${img.status === 'processing' ? '<div class="processing-overlay"><div class="spinner"></div></div>' : ''}
                    </div>
                    <span class="status status-${img.status}">${getStatusText(img.status)}</span>
                    <div class="actions">
                        <button class="action-btn btn-danger" onclick="removeImage('${img.id}')" title="删除">🗑</button>
                        ${img.status === 'error' ? `<button class="action-btn btn-warning" onclick="retryImage('${img.id}')" title="重试">🔄</button>` : ''}
                    </div>
                    <div class="info">
                        <div class="filename" title="${img.name}">${img.name}</div>
                        <div class="dimensions">${img.width} × ${img.height}</div>
                    </div>
                `;
                elements.sourceGrid.appendChild(card);
            });
        }

        // 渲染结果网格（按原始图片顺序）
        function renderResultGrid() {
            elements.resultGrid.innerHTML = '';
            elements.resultEmpty.style.display = state.results.size ? 'none' : 'block';
            
            // 按 state.images 的顺序遍历，保持序列帧顺序
            state.images.forEach(original => {
                const result = state.results.get(original.id);
                if (!result) return;
                
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <div class="thumb-container" style="background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;">
                        <img src="${result}" alt="${original.name}">
                    </div>
                    <div class="actions">
                        <button class="action-btn btn-primary" onclick="previewCompare('${original.id}')" title="对比预览">👁</button>
                        <button class="action-btn btn-warning" onclick="retryImage('${original.id}')" title="重新处理">🔄</button>
                        <button class="action-btn btn-success" onclick="downloadSingle('${original.id}')" title="下载">💾</button>
                        <button class="action-btn btn-secondary" onclick="checkTransparency('${original.id}')" title="检查透明度">🔍</button>
                    </div>
                    <div class="info">
                        <div class="filename" title="${original.name}">${original.name}</div>
                        <div class="dimensions">抠图完成</div>
                    </div>
                `;
                elements.resultGrid.appendChild(card);
            });
            
            updateSequencePlayer();
        }

        // 获取状态文本
        function getStatusText(status) {
            const texts = {
                pending: '等待中',
                processing: '处理中',
                success: '成功',
                error: '失败'
            };
            return texts[status] || status;
        }

        // 更新计数
        function updateCounts() {
            elements.sourceCount.textContent = `${state.images.length} 张图片`;
            elements.resultCount.textContent = `${state.results.size} 张完成`;
        }

        // 移除单张图片
        window.removeImage = function(id) {
            state.images = state.images.filter(img => img.id !== id);
            state.results.delete(id);
            renderSourceGrid();
            renderResultGrid();
            updateCounts();
        };

        // 重试单张图片（支持成功/失败的图片重试，保持顺序）
        window.retryImage = async function(id) {
            const img = state.images.find(i => i.id === id);
            if (!img) return;
            
            // 如果正在处理中，不允许重试
            if (img.status === 'processing') {
                showToast('该图片正在处理中，请稍候', 'warning');
                return;
            }
            
            // 如果之前成功过，先删除旧结果
            if (state.results.has(id)) {
                state.results.delete(id);
                // 调整计数
                if (img.status === 'success') {
                    state.completed = Math.max(0, state.completed - 1);
                }
            }
            
            // 重置状态
            img.status = 'pending';
            renderSourceGrid();
            renderResultGrid();
            
            showToast(`正在重新处理: ${img.name}`, 'info');
            
            // 重新处理
            await processImage(img);
            
            // 重新渲染结果（保持原有顺序）
            renderResultGrid();
        };

        // 预览对比
        window.previewCompare = function(id) {
            const original = state.images.find(img => img.id === id);
            const result = state.results.get(id);
            if (original && result) {
                elements.compareOriginal.src = original.data;
                elements.compareResult.src = result;
                elements.previewModal.classList.add('active');
            }
        };

        // 下载单张
        window.downloadSingle = function(id) {
            const original = state.images.find(img => img.id === id);
            const result = state.results.get(id);
            if (original && result) {
                const link = document.createElement('a');
                const baseName = original.name.replace(/\.[^/.]+$/, '');
                link.download = `${baseName}_nobg.png`;
                link.href = result;
                link.click();
            }
        };

        // 检查透明度
        window.checkTransparency = function(id) {
            const result = state.results.get(id);
            const original = state.images.find(img => img.id === id);
            if (!result || !original) return;

            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                let totalPixels = canvas.width * canvas.height;
                let transparentPixels = 0;      // Alpha = 0 (完全透明)
                let semiTransparentPixels = 0;  // Alpha 1-254 (半透明)
                let opaquePixels = 0;           // Alpha = 255 (完全不透明)
                
                // 检查四个角落的像素
                const corners = [
                    0,                                          // 左上
                    (canvas.width - 1) * 4,                     // 右上
                    (canvas.height - 1) * canvas.width * 4,     // 左下
                    ((canvas.height - 1) * canvas.width + canvas.width - 1) * 4  // 右下
                ];
                
                let cornerAlphas = corners.map(i => data[i + 3]);
                
                for (let i = 3; i < data.length; i += 4) {
                    const alpha = data[i];
                    if (alpha === 0) {
                        transparentPixels++;
                    } else if (alpha === 255) {
                        opaquePixels++;
                    } else {
                        semiTransparentPixels++;
                    }
                }
                
                const transparentPercent = ((transparentPixels / totalPixels) * 100).toFixed(1);
                const semiPercent = ((semiTransparentPixels / totalPixels) * 100).toFixed(1);
                const opaquePercent = ((opaquePixels / totalPixels) * 100).toFixed(1);
                
                const cornerStatus = cornerAlphas.every(a => a === 0) ? '✅ 四角完全透明' : 
                                    cornerAlphas.some(a => a === 0) ? '⚠️ 部分角落透明' : '❌ 四角都不透明';
                
                const message = `【${original.name} 透明度分析】

📐 图片尺寸: ${canvas.width} × ${canvas.height}
📊 总像素数: ${totalPixels.toLocaleString()}

🔍 透明度分布:
• 完全透明 (Alpha=0): ${transparentPercent}% (${transparentPixels.toLocaleString()} 像素)
• 半透明 (Alpha=1-254): ${semiPercent}% (${semiTransparentPixels.toLocaleString()} 像素)
• 完全不透明 (Alpha=255): ${opaquePercent}% (${opaquePixels.toLocaleString()} 像素)

🎯 四角Alpha值: [${cornerAlphas.join(', ')}]
${cornerStatus}

${transparentPercent > 30 ? '✅ 背景已移除' : '⚠️ 可能存在残留背景'}`;
                
                alert(message);
                console.log(message);
            };
            img.src = result;
        };

        // 开始处理
        async function startProcessing() {
            const apiKey = elements.apiKey.value.trim();
            if (!apiKey) {
                showToast('请输入 API Key', 'error');
                return;
            }

            if (state.images.length === 0) {
                showToast('请先上传图片', 'warning');
                return;
            }

            state.processing = true;
            state.paused = false;
            state.cancelled = false;
            state.completed = 0;
            state.failed = 0;

            elements.btnStart.disabled = true;
            elements.btnPause.disabled = false;
            elements.btnCancel.disabled = false;
            elements.progressSection.classList.add('active');

            const concurrency = parseInt(elements.concurrency.value) || 1;
            const pendingImages = state.images.filter(img => img.status === 'pending' || img.status === 'error');
            
            updateProgress();

            const queue = [...pendingImages];
            const workers = [];

            for (let i = 0; i < Math.min(concurrency, queue.length); i++) {
                workers.push(processWorker(queue));
            }

            await Promise.all(workers);

            state.processing = false;
            elements.btnStart.disabled = false;
            elements.btnPause.disabled = true;
            elements.btnCancel.disabled = true;

            if (!state.cancelled) {
                showToast(`处理完成！成功 ${state.completed} 张，失败 ${state.failed} 张`, 
                    state.failed === 0 ? 'success' : 'warning');
            }

            elements.btnDownloadAll.disabled = state.results.size === 0;
        }

        // 处理工作器
        async function processWorker(queue) {
            while (queue.length > 0 && !state.cancelled) {
                if (state.paused) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    continue;
                }

                const img = queue.shift();
                if (img) {
                    await processImage(img);
                }
            }
        }

        // 处理单张图片
        async function processImage(img) {
            img.status = 'processing';
            state.currentTasks.add(img.id);
            renderSourceGrid();

            try {
                const result = await callGeminiAPI(img);
                
                // 强制保持原始尺寸（序列帧关键！）
                const enforcedResult = await enforceOriginalDimensions(result, img.width, img.height);
                
                // 应用尺寸调整（如果用户选择了自定义尺寸）
                const processedResult = await applyOutputSettings(enforcedResult, img);
                
                state.results.set(img.id, processedResult);
                img.status = 'success';
                state.completed++;
                renderResultGrid();
            } catch (error) {
                console.error('处理失败:', error);
                img.status = 'error';
                state.failed++;
                showToast(`${img.name} 处理失败: ${error.message}`, 'error');
            }

            state.currentTasks.delete(img.id);
            renderSourceGrid();
            updateProgress();
        }

        // 强制保持原始尺寸（序列帧动画必须）
        async function enforceOriginalDimensions(dataUrl, targetWidth, targetHeight) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    // 如果尺寸已经匹配，直接返回
                    if (img.width === targetWidth && img.height === targetHeight) {
                        resolve(dataUrl);
                        return;
                    }

                    console.log(`尺寸修正: ${img.width}x${img.height} -> ${targetWidth}x${targetHeight}`);

                    // 创建目标尺寸的画布
                    const canvas = document.createElement('canvas');
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    const ctx = canvas.getContext('2d');

                    // 清除画布（透明背景）
                    ctx.clearRect(0, 0, targetWidth, targetHeight);

                    // 计算缩放和居中
                    const scale = Math.min(targetWidth / img.width, targetHeight / img.height);
                    const scaledWidth = img.width * scale;
                    const scaledHeight = img.height * scale;
                    const offsetX = (targetWidth - scaledWidth) / 2;
                    const offsetY = (targetHeight - scaledHeight) / 2;

                    // 绘制图像（居中）
                    ctx.drawImage(img, offsetX, offsetY, scaledWidth, scaledHeight);

                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = dataUrl;
            });
        }

        // 调用 Gemini API
        async function callGeminiAPI(img) {
            const apiKey = elements.apiKey.value.trim();
            const model = elements.modelSelect.value;
            
            // 将图片转换为 base64
            const base64Data = img.data.split(',')[1];
            const mimeType = img.file.type;

            const prompt = elements.promptText.value.trim() || DEFAULT_PROMPT;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: prompt },
                        {
                            inlineData: {
                                mimeType: mimeType,
                                data: base64Data
                            }
                        }
                    ]
                }],
                generationConfig: {
                    responseModalities: ["TEXT", "IMAGE"]
                }
            };

            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                }
            );

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                if (response.status === 401 || response.status === 403) {
                    throw new Error('API Key 无效或权限不足，请检查 Key 是否正确');
                } else if (response.status === 429) {
                    throw new Error('API 调用频率超限，请降低并发或稍后重试');
                } else if (response.status === 503) {
                    throw new Error('模型服务器繁忙，请稍后点击重试，或切换其他模型');
                } else if (response.status === 400) {
                    throw new Error('请求参数错误: ' + (errorData.error?.message || '未知错误'));
                } else {
                    throw new Error(`API 错误 (${response.status}): ${errorData.error?.message || '未知错误'}`);
                }
            }

            const data = await response.json();
            
            // 从响应中提取图片
            if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                const parts = data.candidates[0].content.parts;
                for (const part of parts) {
                    if (part.inlineData) {
                        return `data:${part.inlineData.mimeType || 'image/png'};base64,${part.inlineData.data}`;
                    }
                }
            }

            throw new Error('API 响应中没有找到图片数据');
        }

        // 应用输出设置
        async function applyOutputSettings(dataUrl, originalImg) {
            const sizeMode = elements.sizeMode.value;
            
            if (sizeMode === 'original') {
                return dataUrl;
            }

            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    let targetWidth, targetHeight;

                    if (sizeMode === 'custom') {
                        targetWidth = parseInt(elements.customWidth.value) || img.width;
                        targetHeight = parseInt(elements.customHeight.value) || img.height;
                        
                        if (elements.lockRatio.checked) {
                            const ratio = img.width / img.height;
                            if (targetWidth / targetHeight > ratio) {
                                targetWidth = Math.round(targetHeight * ratio);
                            } else {
                                targetHeight = Math.round(targetWidth / ratio);
                            }
                        }
                    } else if (sizeMode === 'scale') {
                        const scale = (parseInt(elements.scalePercent.value) || 100) / 100;
                        targetWidth = Math.round(img.width * scale);
                        targetHeight = Math.round(img.height * scale);
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

                    const format = elements.outputFormat.value;
                    const mimeType = format === 'webp' ? 'image/webp' : 'image/png';
                    resolve(canvas.toDataURL(mimeType));
                };
                img.src = dataUrl;
            });
        }

        // 更新进度
        function updateProgress() {
            const total = state.images.length;
            const done = state.completed + state.failed;
            const percent = total > 0 ? (done / total) * 100 : 0;
            
            elements.progressBar.style.width = `${percent}%`;
            elements.progressText.textContent = `${done} / ${total}`;
        }

        // 暂停/继续
        function togglePause() {
            state.paused = !state.paused;
            elements.btnPause.textContent = state.paused ? '▶ 继续' : '⏸ 暂停';
            showToast(state.paused ? '已暂停' : '继续处理中...', 'info');
        }

        // 取消处理
        function cancelProcessing() {
            state.cancelled = true;
            state.processing = false;
            elements.btnStart.disabled = false;
            elements.btnPause.disabled = true;
            elements.btnCancel.disabled = true;
            showToast('已取消处理', 'warning');
        }

        // 清空全部
        function clearAll() {
            state.images = [];
            state.results.clear();
            state.completed = 0;
            state.failed = 0;
            renderSourceGrid();
            renderResultGrid();
            updateCounts();
            elements.progressSection.classList.remove('active');
            elements.btnDownloadAll.disabled = true;
            showToast('已清空所有图片', 'info');
        }

        // 批量下载
        async function downloadAll() {
            if (state.results.size === 0) {
                showToast('没有可下载的图片', 'warning');
                return;
            }

            showToast('正在打包...', 'info');

            try {
                const zip = new JSZip();
                
                state.results.forEach((dataUrl, id) => {
                    const original = state.images.find(img => img.id === id);
                    if (original) {
                        const baseName = original.name.replace(/\.[^/.]+$/, '');
                        const base64 = dataUrl.split(',')[1];
                        zip.file(`${baseName}_nobg.png`, base64, { base64: true });
                    }
                });

                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `抠图结果_${new Date().toISOString().slice(0, 10)}.zip`;
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);

                showToast('下载完成！', 'success');
            } catch (error) {
                showToast('打包下载失败: ' + error.message, 'error');
            }
        }

        // 更新序列帧播放器
        function updateSequencePlayer() {
            const resultArray = Array.from(state.results.values());
            elements.totalFrames.textContent = resultArray.length;
            elements.frameSlider.max = Math.max(0, resultArray.length - 1);
            
            if (resultArray.length > 0) {
                updateSequenceDisplay();
            }
        }

        // 更新序列帧显示
        function updateSequenceDisplay() {
            const resultArray = Array.from(state.results.values());
            if (resultArray.length === 0) {
                elements.sequenceDisplay.innerHTML = '<p style="color: var(--text-secondary);">完成处理后可预览序列帧</p>';
                return;
            }

            state.currentFrame = Math.min(state.currentFrame, resultArray.length - 1);
            elements.sequenceDisplay.innerHTML = `<img src="${resultArray[state.currentFrame]}" alt="Frame ${state.currentFrame}">`;
            elements.frameValue.textContent = state.currentFrame + 1;
            elements.frameSlider.value = state.currentFrame;
        }

        // 切换序列帧播放
        function toggleSequencePlay() {
            if (state.sequencePlaying) {
                stopSequence();
            } else {
                playSequence();
            }
        }

        // 播放序列帧
        function playSequence() {
            const resultArray = Array.from(state.results.values());
            if (resultArray.length === 0) return;

            state.sequencePlaying = true;
            elements.btnSeqPlay.textContent = '⏸ 暂停';
            
            const fps = parseInt(elements.fpsSlider.value);
            state.sequenceInterval = setInterval(() => {
                state.currentFrame = (state.currentFrame + 1) % resultArray.length;
                updateSequenceDisplay();
            }, 1000 / fps);
        }

        // 停止序列帧
        function stopSequence() {
            state.sequencePlaying = false;
            elements.btnSeqPlay.textContent = '▶ 播放';
            if (state.sequenceInterval) {
                clearInterval(state.sequenceInterval);
                state.sequenceInterval = null;
            }
        }

        // 导航帧
        function navigateFrame(delta) {
            const resultArray = Array.from(state.results.values());
            if (resultArray.length === 0) return;
            
            state.currentFrame = (state.currentFrame + delta + resultArray.length) % resultArray.length;
            updateSequenceDisplay();
        }

        // 显示 Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            elements.toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
